<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Character tap game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden; position: relative;
    /* remove any global tap highlight */
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SKY ── */
  .sky {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #c5e8ff 0%, #eef7ff 55%, #d8f5e4 100%);
    z-index: 0;
  }
  .cloud {
    position: absolute; background: white; border-radius: 60px; opacity: 0.6;
    animation: cloudDrift linear infinite;
  }
  @keyframes cloudDrift {
    from { transform: translateX(-240px); }
    to   { transform: translateX(calc(100vw + 240px)); }
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; display: none; z-index: 10;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .screen.active { display: flex; }

  /* ── TOP ── */
  .top-title {
    font-size: clamp(2rem, 8vw, 3rem); font-weight: 900;
    color: #5bb8f5;
    text-shadow: 0 3px 0 rgba(255,255,255,0.95), 0 6px 18px rgba(100,180,255,0.2);
    margin-bottom: 6px;
    animation: float3 3s ease-in-out infinite;
  }
  @keyframes float3 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .top-sub { font-size: 0.92rem; color: #95cce8; margin-bottom: 34px; }

  .menu-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: min(90vw, 360px); }
  .menu-card {
    background: white; border: none; border-radius: 26px;
    padding: 22px 12px 18px; cursor: pointer; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.06), 0 2px 18px rgba(0,0,0,0.05);
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .menu-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 5px; border-radius: 26px 26px 0 0;
  }
  .menu-card:nth-child(1)::before { background: linear-gradient(90deg,#ffb3c6,#ff8fa3); }
  .menu-card:nth-child(2)::before { background: linear-gradient(90deg,#93c5fd,#60a5fa); }
  .menu-card:nth-child(3)::before { background: linear-gradient(90deg,#fcd34d,#fb923c); }
  .menu-card:nth-child(4)::before { background: linear-gradient(90deg,#86efac,#34d399); }
  .menu-card:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.06); }
  .menu-card .micon { font-size: 2rem; }
  .menu-card .mname { font-size: 1.05rem; font-weight: 900; color: #444; }
  .menu-card .msub  { font-size: 0.7rem; color: #bbb; }

  /* ── HUD ── */
  #game-screen { justify-content: flex-start; background: transparent; pointer-events: none; }
  .hud {
    pointer-events: all; width: 100%;
    padding: 10px 14px 6px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .back-btn {
    background: rgba(255,255,255,0.92); border: none; border-radius: 50px;
    padding: 8px 16px; font-family: inherit; font-size: 0.85rem; font-weight: 700;
    color: #777; cursor: pointer; pointer-events: all;
    box-shadow: 0 3px 0 rgba(0,0,0,0.06); backdrop-filter: blur(6px);
    -webkit-tap-highlight-color: transparent; outline: none;
  }
  .target-bubble {
    background: rgba(255,255,255,0.94); border-radius: 50px;
    padding: 7px 20px; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 3px 16px rgba(0,0,0,0.08); backdrop-filter: blur(6px);
  }
  .target-label { font-size: 0.7rem; color: #ccc; font-weight: 700; }
  .target-char  { font-size: 1.6rem; font-weight: 900; color: #f4706a; animation: tpulse 1.3s ease-in-out infinite; }
  @keyframes tpulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.14);} }
  .prog-pill {
    background: rgba(255,255,255,0.92); border-radius: 50px;
    padding: 8px 14px; font-size: 0.78rem; font-weight: 700; color: #888;
    backdrop-filter: blur(6px); box-shadow: 0 3px 0 rgba(0,0,0,0.06); white-space: nowrap;
  }

  /* ── FLOATING CHARS ──
     The key to no square flash:
     - Use a <div> wrapper clipped to circle so the <button> inside never bleeds square
     - Or: pure div with role=button, no <button> element at all
     We use a <div> acting as button so no browser default focus/active rectangle ever appears.
  */
  .float-char {
    position: fixed;
    border-radius: 50%;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900;
    pointer-events: all;
    user-select: none; -webkit-user-select: none;
    z-index: 20; will-change: transform; left: 0; top: 0;
    display: flex; align-items: center; justify-content: center;
    /* soft pillowy shadow */
    box-shadow:
      0 6px 20px rgba(0,0,0,0.09),
      0 2px 6px rgba(0,0,0,0.05),
      inset 0 -4px 0 rgba(0,0,0,0.07),
      inset 0 4px 8px rgba(255,255,255,0.6);
    /* no outline, no tap highlight, no border */
    -webkit-tap-highlight-color: transparent;
    outline: none;
    border: none;
    /* scale on tap via active pseudo */
  }
  .float-char:active {
    filter: brightness(0.96) saturate(0.9);
  }

  .float-char.shake { animation: cshake 0.38s ease; }
  @keyframes cshake {
    0%,100%{transform:translate(var(--tx),var(--ty)) rotate(0);}
    20%    {transform:translate(calc(var(--tx) - 9px),var(--ty)) rotate(-6deg);}
    40%    {transform:translate(calc(var(--tx) + 9px),var(--ty)) rotate(6deg);}
    60%    {transform:translate(calc(var(--tx) - 5px),var(--ty)) rotate(-3deg);}
    80%    {transform:translate(calc(var(--tx) + 5px),var(--ty)) rotate(3deg);}
  }
  .float-char.burst { animation: cburst 0.5s cubic-bezier(.36,.07,.19,.97) forwards; pointer-events: none; }
  @keyframes cburst {
    0%  {transform:translate(var(--tx),var(--ty)) scale(1);   opacity:1;}
    35% {transform:translate(var(--tx),var(--ty)) scale(1.5); opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(0);   opacity:0;}
  }

  /* ── PARTICLES ── */
  .pt { position:fixed;border-radius:50%;pointer-events:none;z-index:99;animation:pfly .65s ease-out forwards; }
  @keyframes pfly {
    0%  {transform:translate(0,0) scale(1);opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
  }
  .sp { position:fixed;pointer-events:none;z-index:99;font-size:1.15rem;animation:spop .72s ease-out forwards; }
  @keyframes spop {
    0%  {transform:translate(0,0) scale(0) rotate(0);opacity:1;}
    50% {opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) scale(1) rotate(var(--rot));opacity:0;}
  }

  /* ── SLOT ── */
  #slot-screen {
    background: linear-gradient(160deg,#fff0f8,#fffbe8);
    gap: 18px; padding: 28px 20px;
  }
  .slot-praise {
    font-size: clamp(1.3rem,5.5vw,1.85rem); font-weight: 900;
    color: #f4706a; text-align: center; line-height: 1.5;
    text-shadow: 0 2px 0 rgba(255,200,100,0.35);
    animation: float3 2.5s ease-in-out infinite;
  }
  .slot-sub {
    font-size: 0.88rem; color: #f4a7a4; text-align: center; margin-top: -10px;
  }
  .slot-box {
    background: white; border-radius: 32px; padding: 22px 20px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    width: min(90vw,340px);
  }
  .reels { display:flex; gap:10px; }
  .reel {
    width:76px; height:90px; background:linear-gradient(180deg,#fff8f5,#fff3f8); border-radius:20px;
    border:2px solid #ffd6e0; overflow:hidden; position:relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.04), 0 2px 10px rgba(255,180,200,0.18);
  }
  .reel-inner { display:flex; flex-direction:column; will-change:transform; }
  .reel-sym { width:76px;height:90px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;flex-shrink:0; }
  .reel-line {
    position:absolute;inset-x:0;top:50%;height:90px;transform:translateY(-50%);
    border-top:2px solid #ffb3c6;border-bottom:2px solid #ffb3c6;pointer-events:none;
  }
  .spin-btn {
    background: linear-gradient(135deg,#ff8fa3,#ffb347);
    border:none; border-radius:50px;
    padding:13px 44px; font-family:inherit; font-size:1.05rem; font-weight:900;
    color:white; cursor:pointer;
    box-shadow: 0 5px 0 #e0708a, 0 2px 14px rgba(255,143,163,.3);
    transition:transform .1s,box-shadow .1s; letter-spacing:.04em;
    -webkit-tap-highlight-color: transparent; outline: none;
  }
  .spin-btn:active:not(:disabled){transform:translateY(4px);box-shadow:0 1px 0 #e0708a;}
  .spin-btn:disabled{opacity:.45;cursor:default;}
  .slot-msg { font-size:1rem;font-weight:700;color:#aaa;min-height:26px;text-align:center; }
  .slot-msg.win { color:#f4706a; }
  .home-btn {
    background:rgba(255,255,255,0.9); border:none; border-radius:50px; padding:12px 32px;
    font-family:inherit; font-size:.92rem; font-weight:700; color:#888; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent; outline: none;
  }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<!-- TOP -->
<div class="screen active" id="top-screen">
  <div class="top-title">🌤 もじタップ！</div>
  <div class="top-sub">すきなもじをえらんでね 🎈</div>
  <div class="menu-wrap">
    <button class="menu-card" onclick="startGame('upper')">
      <span class="micon">🔤</span><span class="mname">A B C</span><span class="msub">大文字アルファベット</span>
    </button>
    <button class="menu-card" onclick="startGame('lower')">
      <span class="micon">🔡</span><span class="mname">a b c</span><span class="msub">小文字アルファベット</span>
    </button>
    <button class="menu-card" onclick="startGame('hiragana')">
      <span class="micon">🌸</span><span class="mname">あいう</span><span class="msub">ひらがな</span>
    </button>
    <button class="menu-card" onclick="startGame('katakana')">
      <span class="micon">⭐</span><span class="mname">アイウ</span><span class="msub">カタカナ</span>
    </button>
  </div>
</div>

<!-- GAME HUD -->
<div class="screen" id="game-screen" style="pointer-events:none;">
  <div class="hud">
    <button class="back-btn" onclick="goHome()">← もどる</button>
    <div class="target-bubble">
      <span class="target-label">つぎ</span>
      <span class="target-char" id="target-char">？</span>
    </div>
    <div class="prog-pill" id="prog-pill">0/0</div>
  </div>
</div>

<!-- SLOT -->
<div class="screen" id="slot-screen">
  <div class="slot-praise" id="slot-praise">🌟 すごい！ぜんぶできたね！🌟</div>
  <div class="slot-sub">ルーレットをまわしてみよう！</div>
  <div class="slot-box">
    <div class="reels">
      <div class="reel"><div class="reel-inner" id="reel0"></div><div class="reel-line"></div></div>
      <div class="reel"><div class="reel-inner" id="reel1"></div><div class="reel-line"></div></div>
      <div class="reel"><div class="reel-inner" id="reel2"></div><div class="reel-line"></div></div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spinSlot()">🎰 まわす！</button>
    <div class="slot-msg" id="slot-msg"></div>
  </div>
  <button class="home-btn" onclick="goHome()">🏠 トップにもどる</button>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────
const MODES = {
  upper:    { type:'alpha', chars:[...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'] },
  lower:    { type:'alpha', chars:[...'abcdefghijklmnopqrstuvwxyz'] },
  hiragana: { type:'kana', rows:[
    ['あ','い','う','え','お'],['か','き','く','け','こ'],
    ['さ','し','す','せ','そ'],['た','ち','つ','て','と'],
    ['な','に','ぬ','ね','の'],['は','ひ','ふ','へ','ほ'],
    ['ま','み','む','め','も'],['や','ゆ','よ'],
    ['ら','り','る','れ','ろ'],['わ','を','ん']
  ]},
  katakana: { type:'kana', rows:[
    ['ア','イ','ウ','エ','オ'],['カ','キ','ク','ケ','コ'],
    ['サ','シ','ス','セ','ソ'],['タ','チ','ツ','テ','ト'],
    ['ナ','ニ','ヌ','ネ','ノ'],['ハ','ヒ','フ','ヘ','ホ'],
    ['マ','ミ','ム','メ','モ'],['ヤ','ユ','ヨ'],
    ['ラ','リ','ル','レ','ロ'],['ワ','ヲ','ン']
  ]}
};

// Soft pastel bubble palette — beautiful gradient pairs
const BUBBLES = [
  { g:'135deg,#ffd6e0,#ffaec0', fg:'#fff' },  // ローズ
  { g:'135deg,#bbdcff,#93c5fd', fg:'#fff' },  // スカイ
  { g:'135deg,#ffe8a1,#ffd166', fg:'#775' },  // バター
  { g:'135deg,#c8f5d0,#86efac', fg:'#fff' },  // ミント
  { g:'135deg,#e8d5ff,#d8b4fe', fg:'#fff' },  // ラベンダー
  { g:'135deg,#ffd6b3,#fbb97a', fg:'#fff' },  // ピーチ
  { g:'135deg,#b2f0f0,#67e8f9', fg:'#555' },  // アクア
  { g:'135deg,#ffc8e8,#f472b6', fg:'#fff' },  // ピンク
  { g:'135deg,#d4f5c0,#86efac', fg:'#555' },  // ライム
  { g:'135deg,#fde8ff,#e879f9', fg:'#fff' },  // マゼンタ
];

const PCOLS = ['#ff8fa3','#ffd54f','#81c784','#64b5f6','#ba68c8','#ffb74d','#ffffff','#f48fb1'];
const SLOT_S = ['🌟','🍭','🎀','🍩','🌈','🎊','🦄','🍦','🎈','🌸','🍀','💎'];
const PRAISE = [
  ['🌟 すごい！\nぜんぶできたね！🌟',   'すごい！ぜんぶできたね！'],
  ['✨ やったね！\nさすがだよ！✨',       'やったね！さすがだよ！'],
  ['🎉 かんぺき！\nえらいね！🎉',         'かんぺき！えらいね！'],
  ['🌈 すばらしい！\nだいせいこう！🌈',   'すばらしい！だいせいこう！'],
  ['💫 もじはかせだね！\nすごいよ！💫',   'もじはかせだね！すごいよ！'],
  ['🎀 よくがんばったね！\nえらい！🎀',   'よくがんばったね！えらい！'],
];
const HUD_H = 58;

// ── STATE ─────────────────────────────────────────────────────
let gs = { active: false, floating: [] };
let animId = null;

// ── SKY ───────────────────────────────────────────────────────
(function(){
  const sky = document.getElementById('sky');
  [[130,44,'10%',30,0],[85,30,'27%',23,-10],[170,55,'5%',40,-18],[60,22,'42%',17,-5]].forEach(([w,h,top,dur,del])=>{
    const el = document.createElement('div');
    el.className = 'cloud';
    el.style.cssText = `width:${w}px;height:${h}px;top:${top};left:-${w+20}px;animation-duration:${dur}s;animation-delay:${del}s;`;
    [[w*.5,h*1.5,h*.55,w*.18],[w*.38,h*1.15,h*.32,w*.5]].forEach(([bw,bh,bt,bl])=>{
      const b = document.createElement('div');
      b.style.cssText = `width:${bw}px;height:${bh}px;top:-${bt}px;left:${bl}px;background:white;border-radius:50%;position:absolute;`;
      el.appendChild(b);
    });
    sky.appendChild(el);
  });
})();

// ── SPEECH ────────────────────────────────────────────────────
// preload voices early
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', ()=>window.speechSynthesis.getVoices());
}
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = 'ja-JP';
  u.rate  = 0.88;
  u.pitch = 1.25;
  const voices = window.speechSynthesis.getVoices();
  const jp = voices.find(v => v.lang && v.lang.startsWith('ja'));
  if (jp) u.voice = jp;
  window.speechSynthesis.speak(u);
}

// ── AUDIO ─────────────────────────────────────────────────────
let actx;
const ac = () => { if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; };

// 音階周波数 (C4 = ド, D4 = レ, E4 = ミ, F4 = ファ, G4 = ソ, A4 = ラ)
const NOTE_HZ = { C:261.63, D:293.66, E:329.63, F:349.23, G:392.00, A:440.00 };

// a〜z への音階割り当て（指定通り。大文字小文字共通）
const ALPHA_NOTE = {
  a:'C', b:'C', c:'G', d:'G', e:'A', f:'A', g:'G',
  h:'F', i:'F', j:'E', k:'E', l:'D', m:'D', n:'C',
  o:'G', p:'G', q:'F', r:'F', s:'E', t:'E', u:'D',
  v:'G', w:'F', x:'E', y:'D', z:'C'
};

// アルファベット用：音階を歌うように鳴らす（サイン波＋ビブラート風エンベロープ）
function playNote(char) {
  const key = char.toLowerCase();
  const noteName = ALPHA_NOTE[key];
  if (!noteName) return;
  const freq = NOTE_HZ[noteName];
  try {
    const c = ac(), t = c.currentTime;
    const osc  = c.createOscillator();
    const gain = c.createGain();
    // ビブラートLFO
    const lfo  = c.createOscillator();
    const lfoG = c.createGain();
    lfo.frequency.value  = 5.5;   // ビブラート速度
    lfoG.gain.value      = 4;     // ビブラート幅(Hz)
    lfo.connect(lfoG);
    lfoG.connect(osc.frequency);
    lfo.start(t); lfo.stop(t + 0.55);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    // エンベロープ：なめらかに立ち上がり、ゆっくりフェード
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.28, t + 0.06);
    gain.gain.setValueAtTime(0.28, t + 0.28);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.52);

    osc.connect(gain); gain.connect(c.destination);
    osc.start(t); osc.stop(t + 0.55);
  } catch(e) {}
}

// ── SCREENS ───────────────────────────────────────────────────
function showScreen(id) {
  ['top-screen','game-screen','slot-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (s===id) { el.style.display='flex'; el.classList.add('active'); }
    else        { el.style.display='none';  el.classList.remove('active'); }
  });
}
function goHome() {
  gs.active = false;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  clearFloating();
  showScreen('top-screen');
}

// ── START ──────────────────────────────────────────────────────
function startGame(mode) {
  const m = MODES[mode];
  clearFloating();
  gs = {
    active: true, type: m.type, floating: [], doneCount: 0,
    sequence:   m.type==='alpha' ? [...m.chars] : [],
    queue:      m.type==='alpha' ? [...m.chars] : [],
    targetIdx:  0,
    totalChars: m.type==='alpha' ? m.chars.length : m.rows.reduce((a,r)=>a+r.length,0),
    rows:       m.type==='kana' ? m.rows : [],
    rowIdx: 0, rowChars: [], rowTargetIdx: 0,
  };
  showScreen('game-screen');
  if (m.type==='alpha') {
    for (let i=0; i<Math.min(5,gs.queue.length); i++) spawnAlpha();
    updateHUD();
  } else {
    loadRow();
  }
  startLoop();
}

// ── ALPHA ──────────────────────────────────────────────────────
function spawnAlpha() {
  if (!gs.queue.length) return;
  spawnBubble(gs.queue.shift(), (c,el,obj) => handleAlphaTap(c,el,obj));
}
function handleAlphaTap(char, el, obj) {
  if (!gs.active || !obj.alive) return;
  speak(char);
  playNote(char);   // 割り当て音階を歌うように鳴らす
  if (char === gs.sequence[gs.targetIdx]) {
    burst(obj); spawnParticles(obj.x, obj.y);
    gs.targetIdx++; gs.doneCount++;
    setTimeout(() => { if(gs.active && gs.queue.length>0) spawnAlpha(); }, 300);
    updateHUD();
    if (gs.targetIdx >= gs.sequence.length) {
      gs.active = false;
      setTimeout(() => { cancelAnimationFrame(animId); showSlot(); }, 650);
    }
  } else {
    shake(obj);
  }
}

// ── KANA ───────────────────────────────────────────────────────
function loadRow() {
  clearFloating(); gs.floating = [];
  if (gs.rowIdx >= gs.rows.length) {
    gs.active = false;
    setTimeout(() => { cancelAnimationFrame(animId); showSlot(); }, 400);
    return;
  }
  gs.rowChars = [...gs.rows[gs.rowIdx]];
  gs.rowTargetIdx = 0;
  gs.rowChars.forEach((char, i) => {
    spawnBubble(char, (c,el,obj) => handleKanaTap(c,el,obj,i), i*90+60);
  });
  updateHUD();
}
function handleKanaTap(char, el, obj, kanaIdx) {
  if (!gs.active || !obj.alive) return;
  speak(char);
  if (kanaIdx === gs.rowTargetIdx) {
    burst(obj); spawnParticles(obj.x, obj.y);
    gs.rowTargetIdx++; gs.doneCount++;
    updateHUD();
    if (gs.rowTargetIdx >= gs.rowChars.length) {
      gs.rowIdx++;
      setTimeout(() => { if(gs.active) loadRow(); }, 520);
    }
  } else {
    shake(obj);
  }
}

// ── BUBBLE FACTORY ─────────────────────────────────────────────
function spawnBubble(char, tapCb, fadeDelay=0) {
  const size = 66 + Math.random()*22;
  const bp   = BUBBLES[Math.floor(Math.random()*BUBBLES.length)];
  const margin = size/2 + 14;
  const W = window.innerWidth, H = window.innerHeight;
  const x = margin + Math.random()*(W - margin*2);
  const y = HUD_H + margin + Math.random()*(H - HUD_H - margin*2);
  const ang = Math.random()*Math.PI*2;
  const spd = 0.4 + Math.random()*0.8;

  // Use a <div> instead of <button> to completely eliminate any browser
  // native focus-ring / tap-highlight rectangle on mobile.
  const el = document.createElement('div');
  el.className = 'float-char';
  el.setAttribute('role', 'button');
  el.setAttribute('tabindex', '0');
  el.textContent = char;

  el.style.cssText = `
    width:${size}px; height:${size}px; font-size:${size * .41}px;
    background: radial-gradient(circle at 36% 32%, rgba(255,255,255,0.55) 0%, transparent 55%),
                linear-gradient(${bp.g});
    color: ${bp.fg};
    transform: translate(${x-size/2}px, ${y-size/2}px);
    --tx: ${x-size/2}px; --ty: ${y-size/2}px;
    opacity: 0; transition: opacity .38s;
  `;

  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '1'; }, fadeDelay);

  const obj = { char, el, x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, size, alive: true };

  // Use pointerdown for instant response; no mousedown fallback needed
  el.addEventListener('pointerdown', e => { e.preventDefault(); tapCb(char, el, obj); });

  gs.floating.push(obj);
  return obj;
}

function burst(obj) {
  obj.alive = false;
  obj.el.style.pointerEvents = 'none';
  obj.el.style.setProperty('--tx', obj.x - obj.size/2 + 'px');
  obj.el.style.setProperty('--ty', obj.y - obj.size/2 + 'px');
  obj.el.classList.add('burst');
  setTimeout(() => { obj.el.remove(); gs.floating = gs.floating.filter(o=>o!==obj); }, 500);
}

function shake(obj) {
  obj.el.style.setProperty('--tx', obj.x - obj.size/2 + 'px');
  obj.el.style.setProperty('--ty', obj.y - obj.size/2 + 'px');
  obj.el.classList.remove('shake');
  void obj.el.offsetWidth;
  obj.el.classList.add('shake');
  setTimeout(() => obj.el.classList.remove('shake'), 400);
}

// ── LOOP ───────────────────────────────────────────────────────
function startLoop() {
  if (animId) cancelAnimationFrame(animId);
  function loop() {
    if (!gs.active) return;
    const W = window.innerWidth, H = window.innerHeight;
    gs.floating.forEach(o => {
      if (!o.alive) return;
      o.x += o.vx; o.y += o.vy;
      const r = o.size/2;
      if (o.x-r < 0)       { o.x=r;   o.vx= Math.abs(o.vx); }
      if (o.x+r > W)       { o.x=W-r; o.vx=-Math.abs(o.vx); }
      if (o.y-r < HUD_H+2) { o.y=HUD_H+2+r; o.vy= Math.abs(o.vy); }
      if (o.y+r > H)       { o.y=H-r; o.vy=-Math.abs(o.vy); }
      o.el.style.transform = `translate(${o.x-r}px,${o.y-r}px)`;
      o.el.style.setProperty('--tx', o.x-r+'px');
      o.el.style.setProperty('--ty', o.y-r+'px');
    });
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

// ── HUD ────────────────────────────────────────────────────────
function updateHUD() {
  let t = '🎉';
  if (gs.type==='alpha' && gs.targetIdx < gs.sequence.length)    t = gs.sequence[gs.targetIdx];
  if (gs.type==='kana'  && gs.rowTargetIdx < gs.rowChars.length) t = gs.rowChars[gs.rowTargetIdx];
  document.getElementById('target-char').textContent = t;
  document.getElementById('prog-pill').textContent   = `${gs.doneCount}/${gs.totalChars}`;
}

// ── PARTICLES ──────────────────────────────────────────────────
function spawnParticles(cx, cy) {
  for (let i=0; i<20; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const s=6+Math.random()*10, ang=Math.random()*Math.PI*2, d=55+Math.random()*115;
    p.style.cssText = `width:${s}px;height:${s}px;
      background:${PCOLS[Math.floor(Math.random()*PCOLS.length)]};
      left:${cx}px;top:${cy}px;
      --dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 670);
  }
  ['⭐','✨','🌟','💫','🎀','🌸'].forEach(e => {
    const s = document.createElement('div');
    s.className = 'sp';
    const ang = Math.random()*Math.PI*2, d = 80+Math.random()*90;
    s.textContent = e;
    s.style.cssText = `left:${cx}px;top:${cy}px;
      --dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;
      --rot:${(Math.random()-.5)*400}deg;`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 730);
  });
}

// ── CLEAR ──────────────────────────────────────────────────────
function clearFloating() {
  if (!gs.floating) return;
  gs.floating.forEach(o => { if (o.el && o.el.parentNode) o.el.remove(); });
  gs.floating = [];
}

// ── SLOT (1回のみ) ─────────────────────────────────────────────
let slotBusy = false;
let slotUsed  = false;

function showSlot() {
  clearFloating();
  slotUsed  = false;
  slotBusy  = false;

  const p = PRAISE[Math.floor(Math.random()*PRAISE.length)];
  const praiseEl = document.getElementById('slot-praise');
  praiseEl.textContent = p[0];
  // speak praise after a short delay
  setTimeout(() => speak(p[1]), 400);

  for (let r=0; r<3; r++) {
    const inner = document.getElementById('reel'+r);
    inner.innerHTML = '';
    [...SLOT_S].sort(()=>Math.random()-.5).slice(0,10).forEach(sym => {
      const d = document.createElement('div');
      d.className = 'reel-sym'; d.textContent = sym;
      inner.appendChild(d);
    });
    inner.style.transform = 'translateY(0)';
  }
  document.getElementById('slot-msg').textContent = '';
  document.getElementById('slot-msg').className   = 'slot-msg';

  const btn = document.getElementById('spin-btn');
  btn.disabled    = false;
  btn.textContent = '🎰 まわす！';

  showScreen('slot-screen');
}

function spinSlot() {
  if (slotBusy || slotUsed) return;
  slotBusy = true;
  slotUsed = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('slot-msg').textContent = '';

  // ── 当たり確率を事前に決める ──────────────────────────────
  // スリーダブル 40%、ダブル 45%、ハズレ 15%
  const rand = Math.random();
  let winType;
  if      (rand < 0.40) winType = 'triple';
  else if (rand < 0.85) winType = 'double';
  else                  winType = 'miss';

  // 当たり絵柄をランダムに決定
  const winSym = SLOT_S[Math.floor(Math.random() * SLOT_S.length)];

  // 各リールの停止位置を winType に合わせて決定
  // リールの中身は showSlot() で構築済み。ここで当たり絵柄を特定位置に埋め込む
  const finalSymbols = []; // 各リールの停止絵柄
  if (winType === 'triple') {
    finalSymbols[0] = finalSymbols[1] = finalSymbols[2] = winSym;
  } else if (winType === 'double') {
    // どの2リールを揃えるかランダム
    const pair = Math.floor(Math.random() * 3); // 0=左中, 1=左右, 2=中右
    const others = SLOT_S.filter(s => s !== winSym);
    const odd = others[Math.floor(Math.random() * others.length)];
    if      (pair === 0) { finalSymbols[0]=winSym; finalSymbols[1]=winSym; finalSymbols[2]=odd; }
    else if (pair === 1) { finalSymbols[0]=winSym; finalSymbols[1]=odd;    finalSymbols[2]=winSym; }
    else                 { finalSymbols[0]=odd;    finalSymbols[1]=winSym; finalSymbols[2]=winSym; }
  } else {
    // ハズレ：3つ全部バラバラにする
    const shuffled = [...SLOT_S].sort(() => Math.random() - 0.5);
    finalSymbols[0] = shuffled[0];
    finalSymbols[1] = shuffled[1] === shuffled[0] ? shuffled[2] : shuffled[1];
    finalSymbols[2] = (shuffled[3] === finalSymbols[0] || shuffled[3] === finalSymbols[1]) ? shuffled[4] : shuffled[3];
  }

  const results = []; let done = 0;

  for (let r=0; r<3; r++) {
    const inner = document.getElementById('reel'+r);
    const syms  = inner.querySelectorAll('.reel-sym');
    const count = syms.length;

    // 停止させたい絵柄をリール内の最初のマッチ位置へ書き込む
    const targetSym = finalSymbols[r];
    // 中央行に来る位置 = step % count に対応。中央位置に targetSym を置く
    let landPos = -1;
    syms.forEach((s, i) => { if (s.textContent === targetSym && landPos === -1) landPos = i; });
    if (landPos === -1) {
      // なければ強制的に書き込む
      landPos = Math.floor(Math.random() * count);
      syms[landPos].textContent = targetSym;
    }

    const extra  = 8 + r*3 + Math.floor(Math.random()*4);
    const total  = extra * count + landPos;
    let step = 0;
    const rIdx = r;

    function tick() {
      step++;
      inner.style.transform = `translateY(-${(step % count)*90}px)`;
      if (step < total) {
        const delay = step > total-12 ? 62+(total-step)*24 : 56;
        setTimeout(tick, delay);
      } else {
        results[rIdx] = syms[landPos].textContent;
        if (++done === 3) setTimeout(() => finishSlot(results), 240);
      }
    }
    setTimeout(tick, r*210);
  }
}

function finishSlot(results) {
  const triple = results[0]===results[1] && results[1]===results[2];
  const double = !triple && (results[0]===results[1] || results[1]===results[2] || results[0]===results[2]);

  let msg, speech;
  if (triple)      { msg='🎊 スリーダブル！\nさいこーだよ！🎊'; speech='スリーダブル！さいこーだよ！'; }
  else if (double) { msg='✨ ダブル！やったね！✨';             speech='ダブル！やったね！'; }
  else             { msg='またあそんでね！🌈';                  speech='またあそんでね！'; }

  const el = document.getElementById('slot-msg');
  el.textContent = msg;
  el.className   = 'slot-msg' + (triple||double?' win':'');

  // 花火演出：スリーダブルは豪華に、ダブルも十分に
  if (triple) {
    for(let i=0;i<12;i++) setTimeout(()=>{
      const cx = innerWidth * (0.2 + Math.random()*0.6);
      const cy = innerHeight * (0.2 + Math.random()*0.5);
      spawnParticles(cx, cy);
    }, i*110);
  } else if (double) {
    for(let i=0;i<4;i++) setTimeout(()=>spawnParticles(innerWidth/2, innerHeight*.42), i*150);
  }

  // 1回だけ → ボタンを永久に無効化
  document.getElementById('spin-btn').disabled    = true;
  document.getElementById('spin-btn').textContent = '🎰 おしまい！';
  slotBusy = false;

  // sound
  try {
    const c=ac(), t=c.currentTime;
    (triple?[440,550,660,880,1100,1320]:double?[440,550,660,880]:[350,300]).forEach((f,i)=>{
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination); o.frequency.value=f;
      g.gain.setValueAtTime(.18,t+i*.09);
      g.gain.exponentialRampToValueAtTime(.001,t+i*.09+.25);
      o.start(t+i*.09); o.stop(t+i*.09+.28);
    });
  } catch(e) {}

  setTimeout(() => speak(speech), 400);
}

// init
showScreen('top-screen');
</script>
